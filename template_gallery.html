<!DOCTYPE html>
<html>
<head>
    <title>Instacore Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #aaa; }
        .list-item { display: block; background-color: #333; color: white; padding: 20px; margin-bottom: 15px; border-radius: 10px; text-decoration: none; }
        .list-item:active { background-color: #444; }
        .item-title { font-size: 24px; color: #fff; margin-bottom: 8px; }
        .item-meta { font-size: 17px; color: #bbb; line-height: 1.4; }
        .item-actions { display: flex; gap: 10px; margin-top: 12px; }
        .btn-view { background-color: #0088ff; color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-size: 16px; font-weight: bold; display: inline-block; }
        .btn-view:active { background-color: #0066cc; }
        .btn-delete-item { background-color: #cc3333; color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-size: 16px; font-weight: bold; border: none; cursor: pointer; display: inline-block; }
        .btn-delete-item:active { background-color: #990000; }
        .btn-back { display: block; background-color: #ff2a2a; color: white; text-align: center; padding: 20px; text-decoration: none; border-radius: 10px; font-size: 24px; margin-bottom: 30px; font-weight: bold;}
        .empty { text-align: center; color: #666; font-size: 20px; margin-top: 50px; }
    </style>
</head>
<body>
    <a href="/" class="btn-back">⬅ Back to Controller</a>
    <h1>Recording Sessions</h1>
    {% if sessions %}
        {% for s in sessions %}
            <div class="list-item">
                <div class="item-title">{{ s.display_time }}</div>
                <div class="item-meta">Size: {{ s.size }}</div>
                <div class="item-meta">Length: {{ s.duration }}</div>
                <div class="item-actions">
                    <a href="/gallery/{{ s.name }}" class="btn-view">View Files</a>
                    <form method="POST" action="/delete/{{ s.name }}" style="margin: 0; display: inline;" onsubmit="return confirm('Delete this recording?');">
                        <button type="submit" class="btn-delete-item">🗑️ Delete</button>
                    </form>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="empty">No recordings found yet.</div>
    {% endif %}
</body>
</html>
